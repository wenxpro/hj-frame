# 使用 Seata 官方默认配置格式
seata:
  enabled: true
  # 应用ID，默认使用 spring.application.name
  application-id: ${spring.application.name}
  # 事务服务组，默认为 ${spring.application.name}-tx-group
  tx-service-group: ${spring.application.name}-tx-group
  # 数据源代理模式：AT、XA、TCC
  data-source-proxy-mode: AT
  enable-auto-data-source-proxy: true
  
  # 注册中心配置
  registry:
    # 注册中心类型：nacos、eureka、redis、zk、consul、etcd3、sofa、file
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${nacos.server-addr:127.0.0.1:8848}
      group: SEATA_GROUP
      namespace: ${nacos.namespace:}
      cluster: default
      username: ${nacos.username:}
      password: ${nacos.password:}
  
  # 配置中心配置
  config:
    # 配置中心类型：nacos、consul、apollo、zk、etcd3、file
    type: nacos
    nacos:
      server-addr: ${nacos.server-addr:127.0.0.1:8848}
      group: SEATA_GROUP
      namespace: ${nacos.namespace:}
      username: ${nacos.username:}
      password: ${nacos.password:}
      data-id: seataServer.properties
  
  # 客户端配置
  client:
    rm:
      async-commit-buffer-limit: 10000
      report-retry-count: 5
      table-meta-check-enable: false
      report-success-enable: false
      saga-branch-register-enable: false
      tcc-action-interceptor-order: -2147483648
    tm:
      commit-retry-count: 5
      rollback-retry-count: 5
      default-global-transaction-timeout: 60000
      degrade-check: false
      degrade-check-period: 2000
      degrade-check-allow-times: 10
      interceptor-order: -2147483648
  
  # 服务配置
  service:
    vgroup-mapping:
      # 事务服务组映射
      ${spring.application.name}-tx-group: default
    grouplist:
      default: 127.0.0.1:8091
    enable-degrade: false
    disable-global-transaction: false
  
  # 传输配置
  transport:
    type: TCP
    server: NIO
    heartbeat: true
    enable-tm-client-batch-send-request: false
    enable-rm-client-batch-send-request: true
    enable-tc-server-batch-send-response: false
    rpc-rm-request-timeout: 30000
    rpc-tm-request-timeout: 30000
    rpc-tc-request-timeout: 30000
    shutdown-wait: 3
    serialization: seata
    compressor: none 